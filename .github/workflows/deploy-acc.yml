name: Deploy to Firebase Hosting (acc)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to hedgerow-acc
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEDGEROW_ACC }}
          projectId: hedgerow-acc
          channelId: live
